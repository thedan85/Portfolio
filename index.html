<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="index.css" />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo" id="nav-logo"></a>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="#hero" class="nav-link">Home</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
      </ul>
      <div class="nav-contact" id="nav-contact">
        <!-- Contact buttons injected dynamically -->
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== HERO SECTION ========== -->
  <section class="hero" id="hero">
    <div class="hero-container">
      <div class="hero-content reveal">
        <h1 class="hero-name" id="hero-name"></h1>
        <p class="hero-tagline">
          <span id="typing-text"></span><span class="cursor">|</span>
        </p>
        <p class="hero-intro" id="hero-intro"></p>
        <div class="hero-buttons">
          <a href="#projects" class="btn btn-primary">View Projects</a>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== ABOUT SECTION ========== -->
  <section class="section" id="about">
    <div class="container">
      <h2 class="section-title reveal">About Me</h2>
      <div class="about-grid reveal">
        <div class="about-text" id="about-text"></div>
        <div class="about-details">
          <div class="about-card">
            <h3><i class="fas fa-graduation-cap"></i> Education</h3>
            <div id="about-education"></div>
          </div>
          <div class="about-card">
            <h3><i class="fas fa-code"></i> Tech Stack</h3>
            <div class="tech-stack" id="about-tech"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== PROJECTS SECTION ========== -->
  <section class="section section-alt" id="projects">
    <div class="container">
      <h2 class="section-title reveal">Projects</h2>
      <div class="projects-grid" id="projects-grid">
        <!-- Projects are injected dynamically from script.js -->
      </div>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <p id="footer-copy"></p>
        <div class="footer-socials" id="footer-socials">
          <!-- Social links injected dynamically -->
        </div>
      </div>
    </div>
  </footer>

  <script src="index.js"></script>
</body>
</html>
